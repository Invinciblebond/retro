<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - Utopoly</title>
    <meta property="og:image" content="https://i.ibb.co/fzQhyvkV/download-4.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i.ibb.co/fzQhyvkV/download-4.png">
<meta name="description" content="Items you're watching on Utopoly.">
<link rel="icon" type="image/png" href="https://i.ibb.co/N6wqhtTn/f079a25a-b9e0-46d8-98f0-cc38807b3c82-removebg-preview.png">
<link rel="stylesheet" href="assets/retro.css?v=0.07">
<style>
  .wwrap { max-width:900px; margin:24px auto; padding:0 20px; }
  .wwrap h1 { font-size:24px; font-weight:900; margin-bottom:16px; }
  .wrow { display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
  .wrow .iv { width:64px; height:64px; border-radius:10px; background:var(--thumb); display:flex; align-items:center; justify-content:center; font-size:28px; overflow:hidden; flex-shrink:0; }
  .wrow .iv img { width:100%; height:100%; object-fit:cover; }
  .wrow a.nm { font-weight:800; font-size:15px; color:var(--txt); text-decoration:none; }
  .wrow a.nm:hover { color:var(--accent2); }
  .wrow .meta { font-size:12px; color:var(--muted); margin-top:3px; }
  .wrow .sp { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty .big { font-size:46px; margin-bottom:10px; }
</style>
</head>
<body class="theme-1" data-page="wishlist">

<div data-include="header"></div>
<div class="shell">
  <div data-include="rail"></div>
  <main class="main-col">
    <div class="wwrap">
      <h1>❤️ Wishlist</h1>
      <div id="list">Loading…</div>
    </div>
  </main>
</div>
<div data-include="tabbar"></div>
<div data-include="footer"></div>

<script src="assets/retro.js?v=0.07"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/env.js?v=0.07"></script>
<script src="assets/supabaseClient.js?v=0.07"></script>
<script src="assets/auth.js?v=0.07"></script>
<script src="assets/social.js?v=0.07"></script>
<script src="assets/i18n.js?v=0.07"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const sb = window.supabaseClient;
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const fmt = (n) => Number(n ?? 0).toLocaleString();

  async function load() {
    const box = document.getElementById("list");
    const { data: rows } = await sb.rpc("my_wishlist");
    if (!rows?.length) {
      box.innerHTML = `<div class="empty"><div class="big">🤍</div><p>Nothing wishlisted yet — tap the ♡ on any catalog item to watch it for price drops and restocks.</p>
        <a class="btn primary" href="catalog.html" style="margin-top:12px;display:inline-block;">Browse the catalog</a></div>`;
      return;
    }
    box.innerHTML = rows.map((r) => {
      const isLimited = ["limited","limited_u"].includes(r.item_type);
      const avail = r.on_sale && (!isLimited || (r.stock ?? 0) > 0)
        ? `<span style="color:var(--good,#4caf50);font-weight:700;">On sale · <span class="ric">R</span> ${fmt(r.price)}</span>`
        : r.resale_count > 0
          ? `<span style="color:#f1c40f;font-weight:700;">${r.resale_count} resale listing${r.resale_count>1?"s":""} from <span class="ric">R</span> ${fmt(r.lowest_resale)}</span>`
          : `<span>Not currently available</span>`;
      return `<div class="wrow">
        <span class="iv">${r.image_url ? `<img src="${esc(r.image_url)}">` : (r.icon || "📦")}</span>
        <div>
          <a class="nm" href="item.html?id=${r.item_id}">${esc(r.name)}</a>
          <div class="meta">${avail}${isLimited ? ` · RAP ${fmt(r.rap)}` : ""}</div>
        </div>
        <span class="sp"><button class="btn ghost small" data-un="${r.item_id}">Remove ♡</button></span>
      </div>`;
    }).join("");
    box.querySelectorAll("[data-un]").forEach((b) => b.addEventListener("click", async () => {
      await sb.from("wishlists").delete().eq("user_id", session.user.id).eq("item_id", b.dataset.un);
      load();
    }));
  }
  load();
});
</script>
</body>
</html>
