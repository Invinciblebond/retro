<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richest Players - Utopoly</title>
<meta name="description" content="The Utopoly richest players leaderboard — top 25 by Retrobux and by RAP.">
<link rel="icon" type="image/png" href="https://i.ibb.co/N6wqhtTn/f079a25a-b9e0-46d8-98f0-cc38807b3c82-removebg-preview.png">
<link rel="stylesheet" href="assets/retro.css?v=0.07">
<style>
  .lwrap { max-width:760px; margin:24px auto; padding:0 20px; }
  .lwrap h1 { font-size:24px; font-weight:900; margin-bottom:4px; }
  .sub { color:var(--muted); font-size:12.5px; margin-bottom:16px; }
  .ltabs { display:flex; gap:8px; margin-bottom:16px; }
  .ltabs button { padding:9px 16px; border-radius:20px; border:1px solid var(--line); background:var(--card); color:var(--txt); font-size:12.5px; font-weight:800; cursor:pointer; }
  .ltabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 18px; }
  .lrow { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .lrow:last-child { border-bottom:none; }
  .lrow .rk { width:34px; text-align:center; font-weight:900; font-size:15px; color:var(--muted); flex-shrink:0; }
  .lrow .pp { width:40px; height:40px; border-radius:50%; background:var(--thumb); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:var(--muted); }
  .lrow .pp img { width:100%; height:100%; object-fit:cover; }
  .lrow a { color:var(--txt); font-weight:800; text-decoration:none; }
  .lrow a:hover { color:var(--accent2); }
  .lrow .val { margin-left:auto; font-weight:900; }
  .lrow.top1 { background:linear-gradient(90deg, rgba(255,215,0,.16), transparent); border-radius:10px; padding-left:8px; }
  .lrow.top1 .rk { color:#ffd700; }
  .lrow.top2 { background:linear-gradient(90deg, rgba(192,192,192,.14), transparent); border-radius:10px; padding-left:8px; }
  .lrow.top2 .rk { color:#c0c0c0; }
  .lrow.top3 { background:linear-gradient(90deg, rgba(205,127,50,.14), transparent); border-radius:10px; padding-left:8px; }
  .lrow.top3 .rk { color:#cd7f32; }
  .merow { margin-top:14px; padding:12px 16px; border:1px dashed var(--line); border-radius:10px; font-size:13.5px; font-weight:800; text-align:center; }
</style>
</head>
<body class="theme-1" data-page="leaderboard">

<div data-include="header"></div>
<div class="shell">
  <div data-include="rail"></div>
  <main class="main-col">
    <div class="lwrap">
      <h1>🏆 Richest Players</h1>
      <div class="sub"><a href="forum.html" style="color:var(--accent2);">← Back to Forum</a> · <span id="lb-updated"></span></div>
      <div class="ltabs">
        <button data-k="retrobux" class="active">💰 By Retrobux</button>
        <button data-k="rap" >💎 By RAP</button>
      </div>
      <div class="panel" id="lb-list">Loading…</div>
      <div class="merow" id="lb-me" style="display:none;"></div>
    </div>
  </main>
</div>
<div data-include="tabbar"></div>
<div data-include="footer"></div>

<script src="assets/retro.js?v=0.07"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/env.js?v=0.07"></script>
<script src="assets/supabaseClient.js?v=0.07"></script>
<script src="assets/auth.js?v=0.07"></script>
<script src="assets/social.js?v=0.07"></script>
<script src="assets/i18n.js?v=0.07"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const sb = window.supabaseClient;
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const fmt = (n) => Number(n ?? 0).toLocaleString();
  let kind = "retrobux";

  document.querySelectorAll(".ltabs button").forEach((b) => b.addEventListener("click", () => {
    kind = b.dataset.k;
    document.querySelectorAll(".ltabs button").forEach((x) => x.classList.toggle("active", x === b));
    load();
  }));

  async function load() {
    const list = document.getElementById("lb-list");
    list.textContent = "Loading…";
    const { data, error } = await sb.rpc("get_leaderboard", { p_kind: kind });
    if (error || !data) { list.textContent = "Leaderboard unavailable."; return; }
    const rows = data.rows || [];
    const unit = kind === "retrobux" ? "R" : "RAP";
    document.getElementById("lb-updated").textContent =
      "Last updated " + new Date(data.refreshed_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) + " · refreshes every 15 min";
    list.innerHTML = rows.length ? rows.map((r, i) => `
      <div class="lrow ${i===0?"top1":i===1?"top2":i===2?"top3":""}">
        <span class="rk">${i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1)}</span>
        <span class="pp">${(r.avatar_snapshot_url || r.avatar_url) ? `<img src="${esc(r.avatar_snapshot_url || r.avatar_url)}" alt="">` : esc((r.username||"?").slice(0,2).toUpperCase())}</span>
        <a href="${window.profileUrl({ username: r.username, user_number: r.user_number })}" data-hovercard="${esc(r.username)}">${esc(r.username)}</a>
        <span class="val">${kind === "retrobux" ? '<span class="ric">R</span> ' : ""}${fmt(r.value)}${kind === "rap" ? " RAP" : ""}</span>
      </div>`).join("") : '<div style="color:var(--muted);font-size:13px;padding:10px 0;">Nothing here yet.</div>';
    const meEl = document.getElementById("lb-me");
    if (data.my_rank) { meEl.style.display = ""; meEl.textContent = `You're #${fmt(data.my_rank)}`; }
    else meEl.style.display = "none";
  }
  load();
});
</script>
</body>
</html>
