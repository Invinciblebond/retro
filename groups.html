<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groups - Utopoly</title>
    <meta property="og:image" content="https://i.ibb.co/fzQhyvkV/download-4.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i.ibb.co/fzQhyvkV/download-4.png">
<meta name="description" content="Join or create groups on Utopoly. Team up with players, grow a community, and earn together.">
<link rel="icon" type="image/png" href="https://i.ibb.co/N6wqhtTn/f079a25a-b9e0-46d8-98f0-cc38807b3c82-removebg-preview.png">
<link rel="stylesheet" href="assets/retro.css?v=0.07">
<style>
  .gwrap { max-width:980px; margin:24px auto; padding:0 20px; }
  .gwrap h1 { font-size:24px; font-weight:900; margin-bottom:16px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:18px; }
  .panel h4 { font-size:12px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .frm { display:grid; gap:10px; max-width:420px; }
  .frm input, .frm textarea { padding:10px 12px; border-radius:8px; border:1px solid var(--line); background:var(--input); color:var(--txt); font-size:14px; font-family:inherit; }
  .glist { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .gcard { display:flex; gap:12px; align-items:center; background:var(--input); border:1px solid var(--line); border-radius:10px; padding:14px; color:var(--txt); text-decoration:none; }
  .gcard .em { font-size:30px; width:48px; height:48px; display:flex; align-items:center; justify-content:center; background:var(--card); border-radius:10px; flex-shrink:0; overflow:hidden; }
  .gcard .em img { width:100%; height:100%; object-fit:cover; }
  .gcard b { font-size:14px; display:block; }
  .gcard span { font-size:11.5px; color:var(--muted); }
</style>
</head>
<body class="theme-1" data-page="groups">

<div data-include="header"></div>
<div class="shell">
  <div data-include="rail"></div>
  <main class="main-col">
    <div class="gwrap">
      <h1>Groups</h1>
      <div class="panel">
        <h4>Create a group — costs <b style="color:var(--accent2,#6cf);">50 Rix</b></h4>
        <div class="frm">
          <input type="text" id="gr-name" maxlength="50" placeholder="Group name">
          <textarea id="gr-desc" maxlength="500" placeholder="Description"></textarea>
          <input type="text" id="gr-emblem" maxlength="4" placeholder="Emblem (emoji, e.g. ⚔️)">
          <button class="btn primary" id="gr-create" style="justify-self:start;">Create Group (50 Rix)</button>
        </div>
      </div>
      <div class="panel"><h4>Your groups</h4><div class="glist" id="mine"></div></div>
      <div class="panel"><h4>All groups</h4><div class="glist" id="all"></div></div>
    </div>
  </main>
</div>
<div data-include="tabbar"></div>
<div data-include="footer"></div>

<script src="assets/retro.js?v=0.07"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/env.js?v=0.07"></script>
<script src="assets/supabaseClient.js?v=0.07"></script>
<script src="assets/auth.js?v=0.07"></script>
<script src="assets/social.js?v=0.07"></script>
<script src="assets/i18n.js?v=0.07"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const sb = window.supabaseClient;
  const toast = (m,t,ms) => window.retroAuth?.toast?.(m,t,ms);
  const friendly = (m) => window.retroAuth?.friendly?.(m) || m;
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const me = session.user.id;

  document.getElementById("gr-create").addEventListener("click", async () => {
    const name = document.getElementById("gr-name").value.trim();
    if (name.length < 3) return toast("Group names need at least 3 characters.", "err");
    const btn = document.getElementById("gr-create");
    btn.disabled = true; btn.textContent = "Creating…";
    const { data, error } = await sb.rpc("create_group", {
      p_name: name,
      p_description: document.getElementById("gr-desc").value.trim(),
      p_emblem: document.getElementById("gr-emblem").value.trim() || "⭐",
    });
    btn.disabled = false; btn.textContent = "Create Group (50 Rix)";
    if (error) toast(friendly(error.message), "err");
    else { toast("Group created! 50 Rix spent.", "ok"); setTimeout(() => location.href = `group.html?id=${data}`, 900); }
  });

  const card = (g) => `
    <a class="gcard" href="group.html?id=${g.id}">
      <span class="em">${g.emblem_url ? `<img src="${g.emblem_url}">` : (g.emblem || "⭐")}</span>
      <span><b>${g.name}</b><span>${g.member_count.toLocaleString()} member${g.member_count === 1 ? "" : "s"}</span></span>
    </a>`;

  const { data: memberships } = await sb.from("group_members").select("group_id").eq("user_id", me);
  const myIds = (memberships || []).map((m) => m.group_id);
  if (myIds.length) {
    const { data: mine } = await sb.from("groups").select("*").in("id", myIds);
    document.getElementById("mine").innerHTML = (mine || []).map(card).join("");
  } else document.getElementById("mine").innerHTML = '<span style="color:var(--muted);font-size:13px;">You are not in any groups yet.</span>';

  const { data: all } = await sb.from("groups").select("*").order("member_count", { ascending: false }).limit(48);
  document.getElementById("all").innerHTML = (all || []).map(card).join("") || '<span style="color:var(--muted);font-size:13px;">No groups exist yet — create the first one!</span>';
});
</script>
</body>
</html>
