<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item — Utopoly</title>
<link rel="stylesheet" href="assets/retro.css?v=0.07">
<style>
  .item-wrap { max-width:980px; margin:28px auto; padding:0 20px; }
  .item-top { display:flex; gap:26px; flex-wrap:wrap; }
  .item-visual { width:300px; height:300px; background:var(--card); border:1px solid var(--line); border-radius:14px;
    display:flex; align-items:center; justify-content:center; font-size:110px; overflow:hidden; flex-shrink:0; }
  .item-visual img { width:100%; height:100%; object-fit:cover; }
  .item-info { flex:1; min-width:280px; }
  .item-info h1 { font-size:26px; font-weight:900; margin-bottom:6px; }
  .type-tag { display:inline-flex; align-items:center; gap:2px; font-size:12px; font-weight:900; letter-spacing:.5px; margin-bottom:12px; }
  .type-tag .u { color:#2ecc40; font-size:15px; } .type-tag .lim { color:#f1c40f; }
  .type-tag.limited { color:#f1c40f; }
  .type-tag.normal { color:var(--muted); }
  .item-price { font-size:22px; font-weight:900; margin:10px 0 4px; }
  .stock-line { font-size:12.5px; color:var(--muted); font-weight:700; margin-bottom:16px; }
  .own-line { font-size:12.5px; color:#4caf50; font-weight:800; margin-bottom:14px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-top:26px; }
  .panel h4 { font-size:12px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
  .listing { display:flex; align-items:center; gap:12px; padding:10px 4px; border-bottom:1px solid var(--line); font-size:13.5px; font-weight:700; }
  .listing:last-child { border-bottom:none; }
  .listing .price { margin-left:auto; font-weight:900; }
  .modal-ov { position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; }
  .modal-ov.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:26px; width:380px; max-width:92vw; }
  .modal h3 { font-size:16px; font-weight:900; margin-bottom:14px; }
  .fee-row { display:flex; justify-content:space-between; font-size:13px; font-weight:700; padding:6px 0; }
  .fee-row.total { border-top:1px solid var(--line); margin-top:6px; padding-top:10px; font-weight:900; }
  .fee-row .neg { color:#e2231a; }
  .modal input[type=number] { width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--line); background:var(--input); color:var(--txt); font-size:14px; margin-bottom:8px; }
  .modal .row { display:flex; gap:10px; margin-top:16px; }
  .modal .row .btn { flex:1; }
</style>
</head>
<body class="theme-1" data-page="item">

<div data-include="header"></div>

<div class="shell">
  <div data-include="rail"></div>
  <main class="main-col">
    <div class="item-wrap">
      <div class="item-top">
        <div class="item-visual skel" id="ivis"></div>
        <div class="item-info">
          <div class="skel" style="height:28px;width:60%;margin-bottom:12px;" id="iname-skel"></div>
          <h1 id="iname" style="display:none;"></h1>
          <div id="itype"></div>
          <div class="item-price" id="iprice"></div>
          <div class="stock-line" id="istock"></div>
          <div class="own-line" id="iown"></div>
          <div id="iactions"></div>
        </div>
      </div>
      <div class="panel" id="resale-panel" style="display:none;">
        <h4>Resellers — player market</h4>
        <div id="listings"></div>
      </div>
      <div class="panel" id="history-panel" style="display:none;">
        <h4>Price history &amp; RAP</h4>
        <div style="display:flex;gap:22px;flex-wrap:wrap;margin-bottom:12px;">
          <div><div style="font-size:11px;color:var(--muted);font-weight:800;letter-spacing:1px;">RECENT AVERAGE PRICE</div>
            <div style="font-size:20px;font-weight:900;" id="rap-val"></div></div>
          <div><div style="font-size:11px;color:var(--muted);font-weight:800;letter-spacing:1px;">TOTAL SALES</div>
            <div style="font-size:20px;font-weight:900;" id="sales-count"></div></div>
        </div>
        <svg id="ph-chart" viewBox="0 0 600 180" width="100%" preserveAspectRatio="none" style="background:var(--input);border-radius:8px;"></svg>
        <div id="ph-empty" style="display:none;text-align:center;padding:18px;color:var(--muted);font-size:13px;">No sales yet.</div>
      </div>
    </div>
  </main>
</div>

<div class="modal-ov" id="modal-ov"><div class="modal" id="modal"></div></div>

<div data-include="tabbar"></div>
<div data-include="footer"></div>

<script src="assets/retro.js?v=0.07"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/env.js?v=0.07"></script>
<script src="assets/supabaseClient.js?v=0.07"></script>
<script src="assets/auth.js?v=0.07"></script>
<script src="assets/social.js?v=0.07"></script>
<script src="assets/i18n.js?v=0.07"></script>
<script src="assets/avatar-render.js?v=0.07"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const sb = window.supabaseClient;
  const toast = (m,t,ms) => window.retroAuth?.toast?.(m,t,ms);
  const friendly = (m) => window.retroAuth?.friendly?.(m) || m;
  const id = new URLSearchParams(location.search).get("id");
  if (!id) { location.replace("catalog.html"); return; }

  const ov = document.getElementById("modal-ov");
  const modal = document.getElementById("modal");
  function openModal(html) { modal.innerHTML = html; ov.classList.add("open"); }
  function closeModal() { ov.classList.remove("open"); }
  ov.addEventListener("click", (e) => { if (e.target === ov) closeModal(); });

  const { data: item, error } = await sb.from("catalog_items")
    .select("id, name, price, category, icon, image_url, on_sale, sale_percent, item_type, stock, total_quantity, rap, description, created_at, creator_id, creator:profiles(username, user_number)")
    .eq("id", id).single();
  if (error || !item) { toast("Item not found.", "err"); setTimeout(()=>location.replace("catalog.html"), 900); return; }
  document.title = `${item.name} — Utopoly`;
  const IS_LIMITED = ["limited","limited_u"].includes(item.item_type);
  const SOLD_OUT = IS_LIMITED && (item.stock ?? 0) <= 0;
  const RESELLABLE = item.item_type === "limited_u" || (item.item_type === "limited" && SOLD_OUT);
  window.retroViewed?.record({ id: item.id, n: item.name, p: item.price, ic: item.icon, img: item.image_url });

  // visual + name
  const vis = document.getElementById("ivis");
  vis.classList.remove("skel");
  vis.innerHTML = item.image_url ? `<img src="${item.image_url}" alt="${item.name}">` : (item.icon || "📦");
  document.getElementById("iname-skel")?.remove();
  const nameEl = document.getElementById("iname");
  nameEl.textContent = item.name; nameEl.style.display = "block";

  // type tag — ULIMITED: green band + yellow U badge; LIMITED: gold badge
  const typeEl = document.getElementById("itype");
  if (item.item_type === "limited_u") typeEl.innerHTML = '<span class="badge-ulim lg"><span class="bl">LIMITED</span><span class="bu">U</span></span>';
  else if (item.item_type === "limited") typeEl.innerHTML = '<span class="badge-lim lg">LIMITED</span>';
  else typeEl.innerHTML = `<span class="type-tag normal">${item.category?.toUpperCase() || "ITEM"}</span>`;

  const salePrice = item.sale_percent ? Math.floor(item.price * (100 - item.sale_percent) / 100) : item.price;
  document.getElementById("iprice").innerHTML = SOLD_OUT
    ? "" : `<span class="ric">R</span> ${salePrice.toLocaleString()}` +
      (item.sale_percent ? ` <span style="font-size:13px;color:var(--muted);text-decoration:line-through;">R ${item.price.toLocaleString()}</span> <span style="font-size:12px;color:#2ecc40;font-weight:900;">-${item.sale_percent}%</span>` : "");
  document.getElementById("istock").textContent =
    SOLD_OUT ? "Sold out — available only from resellers below" :
    item.item_type === "limited" ? `${item.stock} left in stock — resellable once sold out` :
    item.item_type === "limited_u" ? `${item.stock} of ${item.total_quantity ?? item.stock} serialized copies left` : "";

  // creator attribution + off-sale collectible note
  const creatorName = item.creator?.username;
  document.getElementById("istock").insertAdjacentHTML("beforebegin",
    `<div style="font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:8px;">By ${creatorName
      ? `<a href="${window.profileUrl(item.creator)}" data-hovercard="${creatorName}" style="color:var(--accent2);">${creatorName}</a>`
      : '<span style="color:var(--accent2);">Utopoly</span>'}</div>`);
  if (!item.on_sale && !IS_LIMITED) {
    document.getElementById("istock").textContent = "Off-sale — no longer purchasable from the catalog.";
  } else if (!item.on_sale && IS_LIMITED && !SOLD_OUT) {
    document.getElementById("istock").textContent = "Off-sale collectible — only available from resellers.";
  }

  // my copies
  const { data: copies } = await sb.rpc("get_my_copies", { p_item: id });
  const mine = copies || [];
  if (mine.length) document.getElementById("iown").textContent =
    `✓ You own ${mine.length} ${mine.length > 1 ? "copies" : "copy"}${mine[0].serial ? ` (serial #${mine.map(c=>c.serial).join(", #")})` : ""}`;

  /* ----- actions ----- */
  const actions = document.getElementById("iactions");
  function confirmBuy(label, priceR, onConfirm) {
    openModal(`
      <h3>Confirm purchase</h3>
      <div class="fee-row"><span>${label}</span><span><span class="ric">R</span> ${priceR.toLocaleString()}</span></div>
      <div class="fee-row total"><span>You pay</span><span><span class="ric">R</span> ${priceR.toLocaleString()}</span></div>
      <div class="row">
        <button class="btn ghost" id="m-cancel">Cancel</button>
        <button class="btn primary" id="m-ok">Buy now</button>
      </div>`);
    document.getElementById("m-cancel").onclick = closeModal;
    document.getElementById("m-ok").onclick = onConfirm;
  }

  if (!SOLD_OUT) {
    const buyBtn = document.createElement("button");
    buyBtn.className = "btn primary";
    buyBtn.textContent = "Buy";
    buyBtn.onclick = () => confirmBuy(item.name, salePrice, async () => {
      const b = document.getElementById("m-ok"); b.disabled = true; b.textContent = "Buying…";
      const { error } = await sb.rpc("buy_item", { p_item: id });
      closeModal();
      if (error) toast(friendly(error.message), "err");
      else { toast(`You bought ${item.name}!`, "ok"); setTimeout(()=>location.reload(), 1200); }
    });
    actions.appendChild(buyBtn);
  }

  // Sell (owned unlisted ULimited copies)
  const sellable = RESELLABLE ? mine.filter((c) => !c.listed) : [];
  if (sellable.length) {
    const sellBtn = document.createElement("button");
    sellBtn.className = "btn ghost";
    sellBtn.style.marginLeft = "8px";
    sellBtn.textContent = "Sell";
    sellBtn.onclick = () => {
      openModal(`
        <h3>List ${item.name} for sale</h3>
        <input type="number" id="sell-price" min="1" placeholder="Asking price (Retrobux)">
        <div id="fee-breakdown"></div>
        <div class="row">
          <button class="btn ghost" id="m-cancel">Cancel</button>
          <button class="btn primary" id="m-ok" disabled>Review listing</button>
        </div>`);
      const inp = document.getElementById("sell-price");
      const fb = document.getElementById("fee-breakdown");
      const ok = document.getElementById("m-ok");
      inp.addEventListener("input", () => {
        const p = parseInt(inp.value, 10);
        if (!Number.isFinite(p) || p < 1) { fb.innerHTML = ""; ok.disabled = true; return; }
        const fee = p - Math.floor(p * 0.85);
        fb.innerHTML = `
          <div class="fee-row"><span>Asking price</span><span><span class="ric">R</span> ${p.toLocaleString()}</span></div>
          <div class="fee-row"><span>Platform fee (15%)</span><span class="neg">− <span class="ric">R</span> ${fee.toLocaleString()}</span></div>
          <div class="fee-row total"><span>You receive</span><span><span class="ric">R</span> ${Math.floor(p*0.85).toLocaleString()}</span></div>`;
        ok.disabled = false;
      });
      document.getElementById("m-cancel").onclick = closeModal;
      ok.onclick = async () => {
        const p = parseInt(inp.value, 10);
        ok.disabled = true; ok.textContent = "Listing…";
        const { error } = await sb.rpc("create_listing", { p_inventory: sellable[0].inventory_id, p_price: p });
        closeModal();
        if (error) toast(friendly(error.message), "err");
        else { toast("Listed on the player market!", "ok"); setTimeout(()=>location.reload(), 1100); }
      };
    };
    actions.appendChild(sellBtn);
  }

  /* ----- wishlist (favorites) ----- */
  const { data: { session: mySess } } = await sb.auth.getSession();
  const meId = mySess?.user?.id;
  if (meId) {
    const favBtn = document.createElement("button");
    favBtn.className = "btn ghost";
    favBtn.style.marginLeft = "8px";
    const { data: myFav } = await sb.from("favorites").select("item_id").eq("user_id", meId).eq("item_id", id).maybeSingle();
    let faved = !!myFav;
    const paint = () => favBtn.innerHTML = faved ? "♥ In wishlist" : "♡ Add to wishlist";
    paint();
    favBtn.onclick = async () => {
      const q = faved ? sb.from("favorites").delete().eq("user_id", meId).eq("item_id", id)
                      : sb.from("favorites").insert({ user_id: meId, item_id: id });
      const { error } = await q;
      if (error) return toast(friendly(error.message), "err");
      faved = !faved; paint();
      toast(faved ? "Added to your wishlist!" : "Removed from wishlist.", "ok");
    };
    actions.appendChild(favBtn);
  }

  /* ----- try on (avatar preview) ----- */
  const SLOTS = { hat: "hat", face: "face", shirt: "shirt", tshirt: "tshirt", pants: "pants", gear: "gear", accessory: "accessory" };
  const slot = SLOTS[(item.category || "").toLowerCase()];
  if (slot && meId && window.renderAvatarSVG) {
    const tryBtn = document.createElement("button");
    tryBtn.className = "btn ghost";
    tryBtn.style.marginLeft = "8px";
    tryBtn.textContent = "👤 Try on";
    tryBtn.onclick = async () => {
      const { data: prof } = await sb.from("profiles").select("avatar_config").eq("id", meId).single();
      const cfg = JSON.parse(JSON.stringify(prof?.avatar_config || {}));
      cfg.equipped = cfg.equipped || {};
      cfg.equipped[slot] = item.id;
      // resolve all equipped items for the renderer
      const ids = [...new Set(Object.values(cfg.equipped).filter(Boolean))];
      const { data: eqItems } = await sb.from("catalog_items").select("id, name, icon, image_url, category").in("id", ids);
      openModal(`
        <h3>Trying on: ${item.name}</h3>
        <div style="width:200px;height:260px;margin:0 auto;">${window.renderAvatarSVG(cfg, eqItems || [])}</div>
        <p style="font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px;">Preview only — buy it to equip it for real in the Avatar editor.</p>
        <div class="row"><button class="btn primary" id="m-cancel">Close</button></div>`);
      document.getElementById("m-cancel").onclick = closeModal;
    };
    actions.appendChild(tryBtn);
  }

  /* ----- resale listings (ULimited) ----- */
  if (RESELLABLE) {
    const panel = document.getElementById("resale-panel");
    panel.style.display = "block";
    if (item.item_type === "limited_u")
      panel.querySelector("h4").insertAdjacentHTML("beforeend", ' <span class="badge-ulim" style="vertical-align:middle;"><span class="bl">LIMITED</span><span class="bu">U</span></span>');
    const box = document.getElementById("listings");
    box.innerHTML = Array.from({length:3},()=>'<div class="skel" style="height:38px;margin-bottom:8px;"></div>').join("");
    const { data: ls } = await sb.rpc("get_item_listings", { p_item: id });
    const myListings = new Set(mine.filter((c) => c.listed).map((c) => c.listing_id));
    box.innerHTML = (ls && ls.length) ? ls.map((l) => `
      <div class="listing">
        <a href="${window.profileUrl({ username: l.seller, user_number: l.seller_number })}" data-hovercard="${l.seller}">${l.seller}</a>
        <span class="price"><span class="ric">R</span> ${l.price.toLocaleString()}</span>
        ${myListings.has(l.listing_id)
          ? `<button class="btn ghost small" data-cancel="${l.listing_id}">Remove</button>`
          : `<button class="btn primary small" data-buy="${l.listing_id}" data-price="${l.price}">Buy</button>`}
      </div>`).join("")
      : `<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px;">
          <div style="font-size:40px;margin-bottom:8px;">🏷️</div>
          No sellers right now — check back later${sellable.length ? ", or list yours with the Sell button" : ""}.
        </div>`;
    box.querySelectorAll("[data-buy]").forEach((b) => b.addEventListener("click", () =>
      confirmBuy(`${item.name} (reseller)`, +b.dataset.price, async () => {
        const okB = document.getElementById("m-ok"); okB.disabled = true; okB.textContent = "Buying…";
        const { error } = await sb.rpc("buy_listing", { p_listing: b.dataset.buy });
        closeModal();
        if (error) toast(friendly(error.message), "err");
        else { toast(`You bought ${item.name} from the player market!`, "ok"); setTimeout(()=>location.reload(), 1200); }
      })));
    box.querySelectorAll("[data-cancel]").forEach((b) => b.addEventListener("click", async () => {
      await sb.rpc("cancel_listing", { p_listing: b.dataset.cancel });
      toast("Listing removed.", "ok"); setTimeout(()=>location.reload(), 800);
    }));
  }

  /* ----- price history + RAP (limiteds) ----- */
  if (IS_LIMITED) {
    const hp = document.getElementById("history-panel");
    hp.style.display = "block";
    document.getElementById("rap-val").innerHTML = `<span class="ric">R</span> ${(item.rap ?? 0).toLocaleString()}`;
    const { data: hist } = await sb.rpc("get_price_history", { p_item: id, p_limit: 60 });
    const pts = (hist || []).slice().reverse();
    document.getElementById("sales-count").textContent = pts.length.toLocaleString();
    const svg = document.getElementById("ph-chart");
    if (!pts.length) { svg.style.display = "none"; document.getElementById("ph-empty").style.display = "block"; }
    else {
      const W = 600, H = 180, P = 14;
      const max = Math.max(...pts.map(p => p.price)), min = Math.min(...pts.map(p => p.price));
      const x = i => pts.length === 1 ? W/2 : P + i * (W - 2*P) / (pts.length - 1);
      const y = v => max === min ? H/2 : H - P - (v - min) * (H - 2*P) / (max - min);
      const d = pts.map((p,i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(p.price).toFixed(1)}`).join(" ");
      svg.innerHTML = `
        <path d="${d} L${x(pts.length-1).toFixed(1)},${H-2} L${x(0).toFixed(1)},${H-2} Z" fill="var(--accent)" opacity="0.12"/>
        <path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
        ${pts.map((p,i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(p.price).toFixed(1)}" r="3" fill="var(--accent)"><title>R ${p.price.toLocaleString()} — ${new Date(p.created_at).toLocaleDateString()}</title></circle>`).join("")}
        <text x="${P}" y="${P+4}" font-size="11" fill="var(--muted)" font-weight="700">R ${max.toLocaleString()}</text>
        <text x="${P}" y="${H-4}" font-size="11" fill="var(--muted)" font-weight="700">R ${min.toLocaleString()}</text>`;
    }
  }
});
</script>
</body>
</html>
