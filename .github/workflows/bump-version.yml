name: Auto-bump site version

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # don't bump the bump commit itself (infinite loop guard)
    if: "!contains(github.event.head_commit.message, '[version bump]')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Bump APP_VERSION and cache stamps
        run: node scripts/bump-version.mjs
      - name: Commit and push
        run: |
          git config user.name "utopoly-bot"
          git config user.email "actions@github.com"
          git add assets/retro.js *.html
          git commit -m "chore: [version bump] auto-increment site version" || exit 0
          git push
