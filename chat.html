<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat - Utopoly</title>
<meta name="description" content="Message friends and other players on Utopoly.">
<link rel="icon" type="image/png" href="https://i.ibb.co/N6wqhtTn/f079a25a-b9e0-46d8-98f0-cc38807b3c82-removebg-preview.png">
<link rel="stylesheet" href="assets/retro.css?v=0.07">
<style>
  .chat-grid { display:flex; gap:0; margin:22px 28px 40px; max-width:1200px; height:calc(100vh - 190px); min-height:440px;
    background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  .convo-list { width:280px; flex-shrink:0; border-right:1px solid var(--line); overflow-y:auto; }
  .convo-list h4 { font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); padding:16px 16px 8px; }
  .convo { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; font-size:13.5px; font-weight:700; }
  .convo:hover, .convo.active { background:rgba(255,255,255,.05); }
  .convo .cpfp { width:38px; height:38px; border-radius:50%; background:var(--thumb); display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:800; color:var(--muted); position:relative; flex-shrink:0; overflow:hidden; }
  .convo .cpfp img { width:100%; height:100%; object-fit:cover; }
  .convo .dot { position:absolute; bottom:0; right:0; width:10px; height:10px; border-radius:50%; border:2px solid var(--card); }
  .convo .dot.on { background:#4caf50; } .convo .dot.off { background:#777; }
  .thread { flex:1; display:flex; flex-direction:column; min-width:0; }
  .thread-head { padding:14px 18px; border-bottom:1px solid var(--line); font-weight:800; font-size:14.5px; display:flex; align-items:center; gap:10px; }
  .msgs { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:8px; }
  .msg { max-width:70%; padding:9px 13px; border-radius:14px; font-size:13.5px; line-height:1.45; word-wrap:break-word; }
  .msg.me { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .msg.them { align-self:flex-start; background:var(--input); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .msg .t { display:block; font-size:9.5px; opacity:.65; margin-top:3px; }
  .composer { display:flex; gap:10px; padding:12px 14px; border-top:1px solid var(--line); }
  .composer input { flex:1; padding:11px 14px; border-radius:10px; border:1px solid var(--line); background:var(--input); color:var(--txt); font-size:13.5px; }
  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; color:var(--muted); }
  .empty-state .big { font-size:52px; margin-bottom:12px; }
  .empty-state p { font-size:13.5px; line-height:1.6; margin-bottom:16px; max-width:320px; }
  @media (max-width:800px){ .convo-list { width:88px; } .convo span.cname, .convo-list h4 { display:none; } }
</style>
</head>
<body class="theme-1" data-page="chat">

<div data-include="header"></div>

<div class="shell">
  <div data-include="rail"></div>
  <main class="main-col">
    <div class="chat-grid">
      <div class="convo-list" id="convos"><h4>Messages</h4></div>
      <div class="thread" id="thread">
        <div class="empty-state" id="thread-empty">
          <div class="big">💬</div>
          <p>Pick a friend on the left to start chatting.<br>Chats unlock when you're mutual friends.</p>
        </div>
      </div>
    </div>
  </main>
</div>

<div data-include="tabbar"></div>
<div data-include="footer"></div>

<script src="assets/retro.js?v=0.07"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/env.js?v=0.07"></script>
<script src="assets/supabaseClient.js?v=0.07"></script>
<script src="assets/auth.js?v=0.07"></script>
<script src="assets/social.js?v=0.07"></script>
<script src="assets/i18n.js?v=0.07"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const sb = window.supabaseClient;
  const toast = (m,t,ms) => window.retroAuth?.toast?.(m,t,ms);
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return; // guard redirects anyway
  const me = session.user.id;

  const convos = document.getElementById("convos");
  const thread = document.getElementById("thread");
  let friends = [], current = null, pollTimer = null;

  // skeleton conversation list
  convos.innerHTML = "<h4>Messages</h4>" +
    Array.from({length:4},()=>'<div class="skel-fr" style="padding:0 16px;"><span class="skel c"></span><span class="skel l"></span></div>').join("");

  const { data } = await sb.rpc("get_friends");
  friends = data || [];

  function renderConvos() {
    convos.innerHTML = "<h4>Messages</h4>" + (friends.length ? friends.map((f) => `
      <div class="convo${current === f.friend_id ? " active" : ""}" data-id="${f.friend_id}" data-hovercard="${f.username}">
        <span class="cpfp">${f.avatar_url ? `<img src="${f.avatar_url}" alt="">` : (f.username||"?").slice(0,2).toUpperCase()}
          <span class="dot ${f.is_online ? "on" : "off"}"></span></span>
        <span class="cname">${f.username}</span>
      </div>`).join("")
      : `<div class="empty-state" style="padding:20px 16px;">
          <div class="big">👋</div>
          <p>No friends yet — chats open up once you're mutual friends with someone.</p>
          <a class="btn primary small" href="home.html">Find people</a>
        </div>`);
    convos.querySelectorAll(".convo").forEach((el) => el.addEventListener("click", () => openThread(el.dataset.id)));
  }

  async function loadMsgs(fid) {
    const { data: msgs } = await sb.from("messages")
      .select("id, sender, body, created_at, read_at")
      .or(`and(sender.eq.${me},recipient.eq.${fid}),and(sender.eq.${fid},recipient.eq.${me})`)
      .order("created_at", { ascending: true })
      .limit(200);
    return msgs || [];
  }

  function msgHtml(m) {
    const t = new Date(m.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const safe = m.body.replace(/&/g,"&amp;").replace(/</g,"&lt;");
    return `<div class="msg ${m.sender === me ? "me" : "them"}">${safe}<span class="t">${t}</span></div>`;
  }

  async function openThread(fid) {
    current = fid;
    clearInterval(pollTimer);
    renderConvos();
    const f = friends.find((x) => x.friend_id === fid);
    thread.innerHTML = `
      <div class="thread-head"><span class="cpfp" style="width:30px;height:30px;border-radius:50%;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;background:var(--thumb);font-size:10px;">${f.avatar_url ? `<img src="${f.avatar_url}" style="width:100%;height:100%;object-fit:cover;">` : (f.username||"?").slice(0,2).toUpperCase()}</span>
        ${f.username} <span style="font-size:11px;font-weight:700;color:${f.is_online ? "#4caf50" : "var(--muted)"};">${f.is_online ? "● Online" : "Offline"}</span></div>
      <div class="msgs" id="msgs"><div class="skel" style="height:40px;width:55%;"></div><div class="skel" style="height:40px;width:45%;align-self:flex-end;"></div></div>
      <form class="composer" id="composer">
        <input type="text" maxlength="2000" placeholder="Message ${f.username}…" autocomplete="off">
        <button class="btn primary" type="submit">Send</button>
      </form>`;
    const msgsEl = document.getElementById("msgs");
    let lastId = 0;
    async function refresh() {
      const msgs = await loadMsgs(fid);
      if (!msgs.length) {
        msgsEl.innerHTML = `<div class="empty-state"><div class="big">📭</div><p>No messages yet — say hi to ${f.username}!</p></div>`;
        return;
      }
      const newest = msgs[msgs.length - 1].id;
      if (newest === lastId) return;
      lastId = newest;
      msgsEl.innerHTML = msgs.map(msgHtml).join("");
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }
    document.addEventListener("chat:refresh", () => { lastId = 0; refresh(); });
    await refresh();
    // mark inbound messages read
    sb.from("messages").update({ read_at: new Date().toISOString() })
      .eq("recipient", me).eq("sender", fid).is("read_at", null).then(() => {});
    pollTimer = setInterval(refresh, 30000); // slow fallback; realtime below is primary

    document.getElementById("composer").addEventListener("submit", async (e) => {
      e.preventDefault();
      const input = e.target.querySelector("input");
      const body = input.value.trim();
      if (!body) return;
      input.value = "";
      const { error } = await sb.rpc("send_chat_message", { p_recipient: fid, p_body: body });
      if (error) { toast(window.retroAuth.friendly(error.message), "err"); input.value = body; return; }
      lastId = 0; await refresh();
    });
  }

  renderConvos();
  loadUnread();

  /* unread badges on conversation list */
  async function loadUnread() {
    const { data: unread } = await sb.from("messages").select("sender").eq("recipient", me).is("read_at", null);
    const counts = {};
    (unread || []).forEach((m) => counts[m.sender] = (counts[m.sender] || 0) + 1);
    convos.querySelectorAll(".convo").forEach((el) => {
      el.querySelector(".unread-b")?.remove();
      const n = counts[el.dataset.id];
      if (n && el.dataset.id !== current) {
        const b = document.createElement("span");
        b.className = "unread-b";
        b.style.cssText = "margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:900;border-radius:10px;padding:2px 7px;";
        b.textContent = n;
        el.appendChild(b);
      }
    });
  }

  /* Supabase Realtime: live message delivery */
  sb.channel("chat-" + me)
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: `recipient=eq.${me}` }, (payload) => {
      if (payload.new.sender === current) {
        document.dispatchEvent(new CustomEvent("chat:refresh"));
        sb.from("messages").update({ read_at: new Date().toISOString() }).eq("id", payload.new.id).then(() => {});
      } else {
        loadUnread();
        toast("💬 New message", "info", 2500);
      }
    })
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: `sender=eq.${me}` }, () => {
      if (current) document.dispatchEvent(new CustomEvent("chat:refresh"));
    })
    .subscribe();

  const want = new URLSearchParams(location.search).get("u");
  if (want) {
    const f = friends.find((x) => x.username.toLowerCase() === want.toLowerCase());
    if (f) openThread(f.friend_id);
  }
});
</script>
</body>
</html>
