<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar - Utopoly</title>
    <meta property="og:image" content="https://i.ibb.co/fzQhyvkV/download-4.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i.ibb.co/fzQhyvkV/download-4.png">
<meta name="description" content="Customize your Utopoly avatar with hats, faces, shirts, pants, and gear.">
<link rel="icon" type="image/png" href="https://i.ibb.co/N6wqhtTn/f079a25a-b9e0-46d8-98f0-cc38807b3c82-removebg-preview.png">
<link rel="stylesheet" href="assets/retro.css?v=0.07">
<style>
  .awrap { max-width:1000px; margin:24px auto; padding:0 20px; display:flex; gap:24px; flex-wrap:wrap; }
  .apreview { width:320px; flex-shrink:0; }
  .stage { width:320px; height:400px; background:var(--card); border:1px solid var(--line); border-radius:14px; position:relative; overflow:hidden; }
  .stage img.snap { width:100%; height:100%; object-fit:contain; display:block; }
  .stage canvas { display:block; }
  .view-toggle { position:absolute; top:8px; right:8px; z-index:2; padding:5px 10px; border-radius:14px; border:1px solid var(--line); background:var(--input); color:var(--txt); font-size:11px; font-weight:800; cursor:pointer; }
  .aeditor { flex:1; min-width:300px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }
  .panel h4 { font-size:12px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .slot-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .slot-tabs button { padding:7px 14px; border-radius:16px; border:1px solid var(--line); background:var(--input); color:var(--txt); font-size:12px; font-weight:800; cursor:pointer; }
  .slot-tabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .igrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:10px; }
  .icard { background:var(--input); border:1px solid var(--line); border-radius:10px; padding:8px; text-align:center; cursor:pointer; font-size:11px; font-weight:700; }
  .icard.eq { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .icard .iv { height:56px; display:flex; align-items:center; justify-content:center; font-size:30px; overflow:hidden; border-radius:6px; margin-bottom:6px; }
  .icard img { width:100%; height:100%; object-fit:cover; }
  .colors { display:flex; gap:8px; flex-wrap:wrap; }
  .csw { width:34px; height:34px; border-radius:8px; cursor:pointer; border:2px solid transparent; }
  .csw.sel { border-color:#fff; box-shadow:0 0 0 2px var(--accent); }
</style>
</head>
<body class="theme-1" data-page="avatar">

<div data-include="header"></div>
<div class="shell">
  <div data-include="rail"></div>
  <main class="main-col">
    <div class="awrap">
      <div class="apreview">
        <div class="stage" id="stage">
          <button class="view-toggle" id="view3d" style="display:none;">View in 3D</button>
          <div id="stage-body" style="width:100%;height:100%;"></div>
        </div>
        <button class="btn primary block" id="save" style="margin-top:14px;width:100%;">Save Avatar</button>
      </div>
      <div class="aeditor">
        <div class="panel">
          <h4>Body colors</h4>
          <div class="colors" id="colors"></div>
        </div>
        <div class="panel">
          <h4>Wardrobe — items you own</h4>
          <div class="slot-tabs" id="slots"></div>
          <div class="igrid" id="items"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div data-include="tabbar"></div>
<div data-include="footer"></div>

<script src="assets/retro.js?v=0.07"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/env.js?v=0.07"></script>
<script src="assets/supabaseClient.js?v=0.07"></script>
<script src="assets/auth.js?v=0.07"></script>
<script src="assets/social.js?v=0.07"></script>
<script src="assets/i18n.js?v=0.07"></script>
<script src="assets/avatar-render.js?v=0.07"></script>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import { loadModel, snapshotPNG, mountViewer, svgToPNG, publishSnapshot } from "./assets/avatar3d.js?v=0.07";

document.addEventListener("DOMContentLoaded", async () => {
  const sb = window.supabaseClient;
  const toast = (m,t,ms) => window.retroAuth?.toast?.(m,t,ms);
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const me = session.user.id;

  const SLOTS = { Hats: "hat", Faces: "face", Shirts: "shirt", "T-Shirts": "tshirt", Pants: "pants", Gear: "gear", Accessories: "accessory" };
  const SLOT_LABELS = { hat: "Hat", face: "Face", shirt: "Shirt", tshirt: "T-Shirt", pants: "Pants", gear: "Gear", accessory: "Accessory" };
  const COLORS = ["#f5d29a","#e0ac69","#8d5524","#c68642","#ffdbac","#a0c8f0","#f0a0a0","#a8e6a1","#f9e79f","#d7bde2","#aab7b8","#5d6d7e"];

  /* load config + inventory */
  const { data: prof } = await sb.from("profiles").select("avatar_config, avatar_snapshot_url").eq("id", me).single();
  const cfg = Object.assign({ body_color: COLORS[0], equipped: {} }, prof?.avatar_config || {});
  const { data: inv } = await sb.from("inventory")
    .select("id, catalog_items(id, name, icon, image_url, category, item_type)").eq("user_id", me);
  const items = (inv || []).map((r) => r.catalog_items).filter(Boolean)
    .filter((v, i, a) => a.findIndex((x) => x.id === v.id) === i);

  /* preview — 2D snapshot by default, toggle to interactive 3D */
  const stageBody = document.getElementById("stage-body");
  const toggleBtn = document.getElementById("view3d");
  let has3D = false, viewer = null, mode = "2d";
  let snapUrl = prof?.avatar_snapshot_url || null;

  loadModel().then(() => {
    has3D = true; toggleBtn.style.display = "";
    if (mode === "2d") show2D(); // re-render with fresh 3D snapshot once model is ready
  }).catch(() => {});

  async function show2D() {
    if (viewer) { viewer.dispose(); viewer = null; }
    mode = "2d"; toggleBtn.textContent = "View in 3D";
    if (has3D) {
      // Fresh client-side render so framing always matches current settings.
      const blob = await snapshotPNG({ cfg, items });
      if (blob) { stageBody.innerHTML = `<img class="snap" src="${URL.createObjectURL(blob)}" alt="Your avatar">`; return; }
      stageBody.innerHTML = window.renderAvatarSVG(cfg, items);
    } else if (snapUrl) {
      stageBody.innerHTML = `<img class="snap" src="${snapUrl}" alt="Your avatar">`;
    } else {
      stageBody.innerHTML = window.renderAvatarSVG(cfg, items); // legacy fallback until GLB exists
    }
  }

  async function show3D() {
    stageBody.innerHTML = "";
    mode = "3d"; toggleBtn.textContent = "View in 2D";
    try { viewer = await mountViewer(stageBody, { cfg, items }); }
    catch { await show2D(); }
  }

  toggleBtn.addEventListener("click", () => (mode === "2d" ? show3D() : show2D()));

  /* live preview: re-render immediately on any color/item change.
     3D mode re-applies config in place (camera untouched);
     2D mode re-snapshots. Serialized so rapid clicks don't race. */
  let renderBusy = false, renderQueued = false;
  async function render() {
    if (renderBusy) { renderQueued = true; return; }
    renderBusy = true;
    try {
      if (mode === "3d" && viewer?.update) await viewer.update(cfg, items);
      else if (has3D) await show2D();
      else stageBody.innerHTML = window.renderAvatarSVG(cfg, items); // no GLB: live SVG beats stale snapshot
    } finally {
      renderBusy = false;
      if (renderQueued) { renderQueued = false; render(); }
    }
  }
  await show2D();

  /* colors */
  const cbox = document.getElementById("colors");
  COLORS.forEach((c) => {
    const d = document.createElement("div");
    d.className = "csw" + (cfg.body_color === c ? " sel" : "");
    d.style.background = c;
    d.addEventListener("click", () => {
      cfg.body_color = c;
      cbox.querySelectorAll(".csw").forEach((x) => x.classList.toggle("sel", x === d));
      render();
    });
    cbox.appendChild(d);
  });

  /* slot tabs + item grid */
  const slotBox = document.getElementById("slots");
  const grid = document.getElementById("items");
  let activeSlot = "hat";
  Object.values(SLOTS).filter((v, i, a) => a.indexOf(v) === i).forEach((s) => {
    const b = document.createElement("button");
    b.textContent = SLOT_LABELS[s];
    b.className = s === activeSlot ? "active" : "";
    b.addEventListener("click", () => { activeSlot = s; slotBox.querySelectorAll("button").forEach((x) => x.classList.toggle("active", x === b)); paintGrid(); });
    slotBox.appendChild(b);
  });

  function slotOf(cat) { return SLOTS[cat] || "accessory"; }
  function paintGrid() {
    const pool = items.filter((i) => slotOf(i.category) === activeSlot);
    grid.innerHTML = pool.length ? "" : '<div style="grid-column:1/-1;color:var(--muted);font-size:12.5px;">You don\'t own any items for this slot yet — check the <a href="catalog.html">catalog</a>.</div>';
    pool.forEach((it) => {
      const d = document.createElement("div");
      d.className = "icard" + (cfg.equipped[activeSlot] === it.id ? " eq" : "");
      d.innerHTML = `<div class="iv">${it.image_url ? `<img src="${it.image_url}">` : (it.icon || "📦")}</div>${it.name}
        ${it.item_type === "limited_u" ? '<div style="margin-top:3px;"><span class="badge-ulim"><span class="bl">LIMITED</span><span class="bu">U</span></span></div>'
          : it.item_type === "limited" ? '<div style="margin-top:3px;"><span class="badge-lim">LIMITED</span></div>' : ""}`;
      d.addEventListener("click", () => {
        cfg.equipped[activeSlot] = cfg.equipped[activeSlot] === it.id ? null : it.id;
        paintGrid(); render();
      });
      grid.appendChild(d);
    });
  }
  paintGrid();

  /* save */
  document.getElementById("save").addEventListener("click", async () => {
    const btn = document.getElementById("save");
    btn.disabled = true; btn.textContent = "Saving…";
    const { error } = await sb.from("profiles").update({ avatar_config: cfg, updated_at: new Date().toISOString() }).eq("id", me);
    if (error) {
      btn.disabled = false; btn.textContent = "Save Avatar";
      toast(window.retroAuth.friendly(error.message), "err");
      return;
    }
    /* re-render snapshot on client + publish so homepage updates */
    try {
      btn.textContent = "Rendering…";
      let blob = await snapshotPNG({ cfg, items });        // 3D model if present
      if (!blob) blob = await svgToPNG(window.renderAvatarSVG(cfg, items)); // fallback: SVG raster
      const url = await publishSnapshot(sb, me, blob);
      snapUrl = url;
      if (mode === "2d") await show2D();
      toast("Avatar saved!", "ok");
    } catch (e) {
      toast("Saved, but snapshot upload failed: " + (e.message || e), "err");
    }
    btn.disabled = false; btn.textContent = "Save Avatar";
  });
});
</script>
</body>
</html>
