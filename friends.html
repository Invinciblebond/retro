<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends - Utopoly</title>
<meta name="description" content="Your friends, friend requests, and sent requests on Utopoly.">
<link rel="icon" type="image/png" href="https://i.ibb.co/N6wqhtTn/f079a25a-b9e0-46d8-98f0-cc38807b3c82-removebg-preview.png">
<link rel="stylesheet" href="assets/retro.css?v=0.07">
<style>
  .fwrap { max-width:1000px; margin:24px auto; padding:0 20px; }
  .fwrap h1 { font-size:24px; font-weight:900; margin-bottom:16px; }
  .ftabs { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .ftabs button { padding:9px 16px; border-radius:20px; border:1px solid var(--line); background:var(--card); color:var(--txt); font-size:12.5px; font-weight:800; cursor:pointer; }
  .ftabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .fgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .fcard { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; cursor:pointer; position:relative; }
  .fcard:hover { border-color:var(--accent); }
  .fcard .top { display:flex; align-items:center; gap:12px; }
  .fcard .fpfp { width:52px; height:52px; border-radius:50%; background:var(--thumb); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:var(--muted); position:relative; flex-shrink:0; }
  .fcard .fpfp img { width:100%; height:100%; object-fit:cover; }
  .fcard .dot { position:absolute; bottom:1px; right:1px; width:11px; height:11px; border-radius:50%; border:2px solid var(--card); }
  .fcard .dot.on { background:#4caf50; } .fcard .dot.off { background:#777; }
  .fcard .nm { font-weight:800; font-size:14px; }
  .fcard .st { font-size:11px; color:var(--muted); margin-top:2px; }
  .fcard .acts { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
  .fmenu-btn { position:absolute; top:8px; right:8px; border:none; background:none; color:var(--muted); font-size:18px; cursor:pointer; padding:2px 8px; border-radius:6px; }
  .fmenu-btn:hover { background:rgba(255,255,255,.07); }
  .fmenu { position:absolute; top:32px; right:8px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:6px; z-index:30; display:none; min-width:150px; box-shadow:0 8px 24px rgba(0,0,0,.35); }
  .fmenu.open { display:block; }
  .fmenu button { display:block; width:100%; text-align:left; padding:8px 10px; border:none; background:none; color:var(--txt); font-size:12.5px; font-weight:700; cursor:pointer; border-radius:6px; }
  .fmenu button:hover { background:rgba(255,255,255,.07); }
  .fmenu button.danger { color:#e2231a; }
  .empty { text-align:center; padding:60px 20px; color:var(--muted); grid-column:1/-1; }
  .empty .big { font-size:46px; margin-bottom:10px; }
</style>
</head>
<body class="theme-1" data-page="friends">

<div data-include="header"></div>
<div class="shell">
  <div data-include="rail"></div>
  <main class="main-col">
    <div class="fwrap">
      <h1>Friends</h1>
      <div class="ftabs">
        <button data-t="friends" class="active">Friends</button>
        <button data-t="requests">Requests <span id="req-count" style="display:none;background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;"></span></button>
        <button data-t="sent">Sent</button>
      </div>
      <div class="fgrid" id="list"><div class="empty">Loading…</div></div>
    </div>
  </main>
</div>
<div data-include="tabbar"></div>
<div data-include="footer"></div>

<script src="assets/retro.js?v=0.07"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/env.js?v=0.07"></script>
<script src="assets/supabaseClient.js?v=0.07"></script>
<script src="assets/auth.js?v=0.07"></script>
<script src="assets/social.js?v=0.07"></script>
<script src="assets/i18n.js?v=0.07"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const sb = window.supabaseClient;
  const toast = (m,t,ms) => window.retroAuth?.toast?.(m,t,ms);
  const friendly = (m) => window.retroAuth?.friendly?.(m) || m;
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const me = session.user.id;
  const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;");
  const list = document.getElementById("list");
  let tab = "friends", muted = new Set();

  document.querySelectorAll(".ftabs button").forEach((b) => b.addEventListener("click", () => {
    tab = b.dataset.t;
    document.querySelectorAll(".ftabs button").forEach((x) => x.classList.toggle("active", x === b));
    render();
  }));

  const pfp = (u) => `<span class="fpfp">${u.avatar_url ? `<img src="${u.avatar_url}" alt="">` : esc((u.username||"?").slice(0,2).toUpperCase())}
    ${u.is_online != null ? `<span class="dot ${u.is_online ? "on" : "off"}"></span>` : ""}</span>`;
  const openProfile = (u) => location.href = window.profileUrl(u.username);

  async function render() {
    list.innerHTML = '<div class="empty">Loading…</div>';
    if (tab === "friends") {
      const [{ data: friends }, { data: myMutes }] = await Promise.all([sb.rpc("get_friends"), sb.rpc("my_mutes")]);
      muted = new Set((myMutes || []).map((m) => m.muted_id));
      if (!friends?.length) return list.innerHTML = `<div class="empty"><div class="big">👋</div>
        <p style="margin-bottom:14px;">No friends yet — find people on Utopoly and send a request from their profile.</p>
        <a class="btn primary" href="home.html">Find people</a></div>`;
      list.innerHTML = friends.map((f) => `
        <div class="fcard" data-uid="${f.friend_id}" data-uname="${esc(f.username)}">
          <button class="fmenu-btn" data-menu title="More">⋯</button>
          <div class="fmenu">
            <button data-act="unfriend">Unfriend</button>
            <button data-act="mute">${muted.has(f.friend_id) ? "Unmute" : "Mute"}</button>
            <button data-act="block" class="danger">Block</button>
          </div>
          <div class="top">${pfp(f)}
            <div><div class="nm">${esc(f.username)}${muted.has(f.friend_id) ? " 🔇" : ""}</div>
            <div class="st">${f.is_online ? "● Online" : "Offline"}</div></div>
          </div>
          <div class="acts"><a class="btn primary small" href="chat.html?u=${encodeURIComponent(f.username)}" data-stop>Message</a></div>
        </div>`).join("");
    } else if (tab === "requests") {
      const { data: reqs } = await sb.rpc("incoming_friend_requests");
      updateReqCount(reqs?.length || 0);
      if (!reqs?.length) return list.innerHTML = `<div class="empty"><div class="big">📥</div><p>No incoming friend requests.</p></div>`;
      list.innerHTML = reqs.map((r) => `
        <div class="fcard" data-uname="${esc(r.username)}">
          <div class="top">${pfp(r)}<div><div class="nm">${esc(r.username)}</div><div class="st">wants to be friends</div></div></div>
          <div class="acts">
            <button class="btn primary small" data-accept data-stop>Accept</button>
            <button class="btn ghost small" data-decline data-stop>Decline</button>
          </div>
        </div>`).join("");
    } else {
      const { data: sent } = await sb.from("friendships")
        .select("id, addressee, profiles!friendships_addressee_fkey(username, avatar_url)")
        .eq("requester", me).eq("status", "pending");
      if (!sent?.length) return list.innerHTML = `<div class="empty"><div class="big">📤</div><p>No pending sent requests.</p></div>`;
      list.innerHTML = sent.map((s) => `
        <div class="fcard" data-uname="${esc(s.profiles?.username)}" data-fid="${s.id}">
          <div class="top">${pfp(s.profiles || {})}<div><div class="nm">${esc(s.profiles?.username)}</div><div class="st">request pending</div></div></div>
          <div class="acts"><button class="btn ghost small" data-cancel data-stop>Cancel request</button></div>
        </div>`).join("");
    }
    wire();
  }

  function updateReqCount(n) {
    const el = document.getElementById("req-count");
    el.style.display = n > 0 ? "" : "none";
    el.textContent = n;
  }

  function wire() {
    list.querySelectorAll(".fcard").forEach((card) => {
      card.addEventListener("click", (e) => {
        if (e.target.closest("[data-stop],[data-menu],.fmenu")) return;
        openProfile({ username: card.dataset.uname });
      });
    });
    list.querySelectorAll("[data-menu]").forEach((b) => b.addEventListener("click", (e) => {
      e.stopPropagation();
      const m = b.parentElement.querySelector(".fmenu");
      document.querySelectorAll(".fmenu.open").forEach((x) => x !== m && x.classList.remove("open"));
      m.classList.toggle("open");
    }));
    document.addEventListener("click", () => document.querySelectorAll(".fmenu.open").forEach((m) => m.classList.remove("open")), { once: true });

    list.querySelectorAll(".fmenu [data-act]").forEach((b) => b.addEventListener("click", async (e) => {
      e.stopPropagation();
      const card = b.closest(".fcard");
      const uid = card.dataset.uid, uname = card.dataset.uname, act = b.dataset.act;
      if (act === "unfriend") {
        if (!confirm(`Remove ${uname} from your friends?`)) return;
        const { error } = await sb.rpc("unfriend_user", { p_target: uid });
        toast(error ? friendly(error.message) : `${uname} removed from your friends.`, error ? "err" : "ok");
      } else if (act === "block") {
        if (!confirm(`Block ${uname}? They won't be able to message you or send you friend requests.`)) return;
        const { error } = await sb.rpc("block_user_id", { p_target: uid });
        toast(error ? friendly(error.message) : `${uname} blocked.`, error ? "err" : "ok");
      } else if (act === "mute") {
        const fn = muted.has(uid) ? "unmute_user" : "mute_user";
        const { error } = await sb.rpc(fn, { p_target: uid });
        toast(error ? friendly(error.message) : (fn === "mute_user" ? `${uname} muted.` : `${uname} unmuted.`), error ? "err" : "ok");
      }
      render();
    }));

    list.querySelectorAll("[data-accept]").forEach((b) => b.addEventListener("click", async () => {
      const uname = b.closest(".fcard").dataset.uname;
      const { error } = await sb.rpc("respond_friend_request", { p_from_username: uname, p_accept: true });
      toast(error ? friendly(error.message) : `You and ${uname} are now friends!`, error ? "err" : "ok");
      render();
    }));
    list.querySelectorAll("[data-decline]").forEach((b) => b.addEventListener("click", async () => {
      const uname = b.closest(".fcard").dataset.uname;
      await sb.rpc("respond_friend_request", { p_from_username: uname, p_accept: false });
      render();
    }));
    list.querySelectorAll("[data-cancel]").forEach((b) => b.addEventListener("click", async () => {
      const card = b.closest(".fcard");
      const { error } = await sb.from("friendships").delete().eq("id", card.dataset.fid).eq("requester", me).eq("status", "pending");
      toast(error ? friendly(error.message) : "Request cancelled.", error ? "err" : "ok");
      render();
    }));
  }

  // incoming request count for the tab badge
  sb.rpc("incoming_friend_requests").then(({ data }) => updateReqCount(data?.length || 0));
  render();
});
</script>
</body>
</html>
